<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="bg-white p-8 rounded-lg shadow w-96">
        <img src="image/github-logo.png" alt="" class="w-16 mx-auto mb-4">
        <h1 class="text-2xl font-bold text-center mb-2">GitHub Issues Tracker</h1>
        <p class="text-center text-gray-500 mb-6">Sign in to manage your issues</p>
        <div class="text-left mb-4">
            <label class="text-sm font-medium">Username</label>
            <input id="username" type="text" placeholder="Enter Username" class="w-full border rounded px-3 py-2 mt-1">
            <p class="text-xs text-blue-600 mt-1">Default: admin</p>
        </div>
        <div class="text-left mb-4">
            <label class="text-sm font-medium">Password</label>
            <input id="password" type="password" placeholder="Enter Password" class="w-full border rounded px-3 py-2 mt-1">
            <p class="text-xs text-blue-600 mt-1">Default: admin123</p>
        </div>
        <button onclick="login()" class="w-full py-2 rounded text-white font-semibold bg-blue-600">Sign In</button>
        
        <div class="flex items-center gap-2 my-6">
            <hr class="flex-1">
            <span class="text-gray-400 text-sm">OR</span>
            <hr class="flex-1">
        </div>
        <div class=" text-center text-sm">
            <p class="text-gray-500 mb-4">Demo Credentials:</p>
            <div class="bg-gray-100 p-4">   
                <p>Username: <b>admin</b> </p>
                <p>Password: <b>admin123</b> </p>
            </div>
        </div>
        
    </div>

    <script src="login.js"></script>
</body>
</html>
