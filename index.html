<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-100 ">

    <div class="bg-white border-b">
        <div class="max-w-7x1 mx-auto flex justify-between items-center p-4">
            <div class="flex items-center gap-2 font-semibold text-lg">
                <img src="image/github-logo.png" alt="" class="w-7">
                <h3 class="font-bold">GitHub Issues Tracker</h3>
            </div>
            <div class="flex gap-2">
                <input id="searchInput" placeholder="Search Issues..." class="border px-3 py-2 rounded w-64">
                <button onclick="searchIssues()" class="bg-purple-600 text-white px-4 py-2 rounded"> Search</button>
            </div>

        </div>

    </div>
        <div class="max-w-7x1 mx-auto mt-6">
            <div class="bg-white p-4 rounded shadow flex gap-3">
                <button id="allTab" onclick="setaActive('all')" class="tab-btn bg-purple-600 text-white px-6 py-2 rounded">All</button>
                <button id="openTab" onclick="setaActive('all')" class="tab-btn border px-6 py-2 rounded">Open</button>
                <button id="closedTab" onclick="setaActive('all')" class="tab-btn border px-6 py-2 rounded">Closed</button>
            </div>
        </div>

    <div class="max-w-7x1 mx-auto mt-6">
        <div class="bg-white px-6 rounded shadow flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-purple-100 p-5 rounded-full">
                    <img src="image/Aperture.png" alt="">
                </div>
                <div>
                    <h2 id="issuesCount" class="font-semibold text-lg">Issues</h2>
                    <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 text-sm gap-1">
                <span class="flex items-center gap-1">
                    <span class="w-3 h-3 bg-green-500 rounded-full">Open</span>
                </span>
                <span class="flex items-center gap-1">
                    <span class="w-3 h-3 bg-purple-500 rounded-full">Closed</span>
                </span>
            </div>
        </div>
    </div>

    <div id="issueContainer" class="max-w-7x1 mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 "></div>
    <dialog id="issueModal" class="modal">
        <div class="modal-box max-w-7x1">
            <h3 id="modalTitle" class="text-xl font-bold mb-2"></h3>
            <div>
                <span class="bg-green-500 text-white px-2 py-1 rounded text-sm">Opened</span>
                <span id="modalAuthor" class="text-sm text-gray-500"></span>
            </div>
            <div>
                <span class="bg-red-100 text-red-500 px-2 py-1 rounded text-xs">BUG</span>
                <span class="bg-yellow-100 text-yellow-600 px-2 py-1 rounded text-xs">HELP WANTED</span>
            </div>
            <p id="modalDescription" class="text-gray-600 mb-4"></p>
            <div class="flex justify-between bg-gray-100 p-4 rounded">
                <div>
                    <p class="text-sm text-gray-500">Assignee</p>
                    <p id="modalAssignee"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-500">Priority</p>
                    <p id="modalPriority" class="bg-red-500 text-white px-3 py-1 rounded text-xs"></p>
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <button class="bg-purple-600 text-white px-4 py-2 rounded">Close</button>
                    </form>
                </div>
            </div>


        </div>

    </dialog>
</body>
</html>
