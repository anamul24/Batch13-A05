<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-100 ">
    <section>
        <div class="bg-white border-b">
        <div class="max-w-7x1 mx-auto flex justify-between items-center p-4">
            <div class="flex items-center gap-2 font-semibold text-lg">
                <img src="image/github-logo.png" alt="" class="w-7">
                <h3 class="font-bold">GitHub Issues Tracker</h3>
            </div>
            <div class="flex gap-2">
                <input id="searchInput" placeholder="Search Issues..." class="border px-3 py-2 rounded w-64">
                <button onclick="searchIssues()" class="bg-purple-600 text-white px-4 py-2 rounded"> Search</button>
            </div>

        </div>

    </div>
    </section>
    <section class="max-w-7x1 mx-auto mt-6">
        <div>
            <div class="bg-white p-4 rounded shadow flex gap-3">
                <button id="allTab" onclick="setaActive('all')" class="tab-btn bg-purple-600 text-white px-6 py-2 rounded">All</button>
                <button id="openTab" onclick="setaActive('all')" class="tab-btn border px-6 py-2 rounded">Open</button>
                <button id="closedTab" onclick="setaActive('all')" class="tab-btn border px-6 py-2 rounded">Closed</button>
            </div>
        </div>
    </section>
</body>
</html>
